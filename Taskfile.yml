version: '3'

tasks:
  default:
    cmds:
      - task: build

  tools:
    desc: Install tool bins
    run: once
    env:
      GOBIN:
        sh: "echo `pwd`/bin"
    cmds:
      - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0
    sources: # run if changed
      - Taskfile.yml
    generates: # run if missing
      - "bin/oapi-codegen"

  build:
    desc: Build the server
    cmds:
      - go build -o bin/server ./cmd/server

  run:
    desc: Run server
    cmds:
      - go run ./cmd/server

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - go fmt ./...
      - go vet ./...

  generate_models:
    desc: Generate models
    deps:
      - tools
    cmds:
      - bin/oapi-codegen --config=api/oapi-codegen.yml api/swagger.yml